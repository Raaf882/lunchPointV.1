<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوحة تحكم نقطة انطلاقة</title>
<link rel="stylesheet" href="styles.css" />
<style>
  body { background: var(--bg); }
  .admin-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 60px; }
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .admin-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tab-btn { cursor: pointer; background: #fff; border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 18px; font-family: inherit; font-weight: 700; font-size: 14px; color: var(--text-muted); }
  .tab-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .admin-tab.hidden { display: none; }
  .toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .toolbar input, .toolbar select { padding: 10px 14px; border-radius: 10px; border: 1.5px solid var(--border); font-family: inherit; font-size: 14px; }
  .toolbar input { flex: 1; min-width: 200px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 12px 32px rgba(5, 22, 54, .12); }
  th, td { padding: 10px 14px; text-align: start; font-size: 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { background: var(--navy); color: #fff; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #f7f9fd; }
  .table-scroll { overflow-x: auto; margin-bottom: 16px; }
  .status-text { color: var(--text-mute2); }
  .content-block { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-bottom: 20px; }
  .content-block h2 { font-size: 18px; margin: 0 0 16px; color: var(--navy); }
  .content-block .field-grid, .content-block .field { margin-bottom: 14px; }
  .content-block textarea { width: 100%; min-height: 90px; padding: 12px 14px; border-radius: 10px; border: 1.5px solid var(--border); font-family: inherit; font-size: 14px; resize: vertical; }
  .content-block input[type="text"], .content-block input[type="email"], .content-block input[type="url"], .content-block input[type="tel"] {
    width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); font-family: inherit; font-size: 14px;
  }
  .content-block label { display: block; font-weight: 700; font-size: 13.5px; margin-bottom: 6px; color: var(--text-muted); }
  .saved-note { color: #1E9E5A; font-size: 13.5px; font-weight: 700; }
  .activity-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .activity-row:last-child { border-bottom: none; }
  .activity-row-title { font-weight: 700; font-size: 14.5px; }
  .activity-row-meta { font-size: 12.5px; color: var(--text-mute3); }
  .small-btn { cursor: pointer; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 700; border: 1.5px solid var(--border); background: #fff; }
  .small-btn.danger { color: #C0392B; border-color: #f0c4bd; }
  .detail-panel { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 20px; }
  .detail-answer-row { display: flex; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .mini-bar { flex: 1; height: 8px; background: #EDF1F6; border-radius: 5px; overflow: hidden; margin: 0 10px; }
  .mini-bar span { display: block; height: 100%; border-radius: 5px; }
  .badge-pill { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }

  .header-actions { display: flex; align-items: center; gap: 10px; }
  .notif-wrap { position: relative; }
  .notif-bell { position: relative; cursor: pointer; width: 38px; height: 38px; border-radius: 10px; border: 1.5px solid var(--border); background: #fff; color: var(--navy); display: flex; align-items: center; justify-content: center; }
  .notif-bell:hover { background: #F7F9FC; }
  .notif-badge { position: absolute; top: -6px; inset-inline-end: -6px; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 999px; background: #C0392B; color: #fff; font-size: 10.5px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
  .notif-dropdown { position: absolute; top: 46px; inset-inline-end: 0; width: 340px; max-height: 420px; overflow-y: auto; background: #fff; border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 20px 50px -20px rgba(5, 22, 54, .4); z-index: 50; }
  @media (max-width: 480px) {
    .notif-dropdown { position: fixed; top: 64px; inset-inline: 12px; width: auto; }
  }
  .notif-dropdown-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #fff; }
  .notif-dropdown-head strong { font-size: 14px; color: var(--navy); }
  .notif-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .notif-item:hover { background: #F7F9FC; }
  .notif-item:last-child { border-bottom: none; }
  .notif-item-dot { flex: 0 0 auto; width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; background: transparent; }
  .notif-item.unread .notif-item-dot { background: var(--blue); }
  .notif-item-body { flex: 1; min-width: 0; }
  .notif-item-type { font-size: 12.5px; font-weight: 700; color: var(--blue); }
  .notif-item-name { font-size: 13.5px; color: var(--navy); font-weight: 600; }
  .notif-item-time { font-size: 11.5px; color: var(--text-mute3); margin-top: 2px; }
  .notif-item-mark-btn { flex: 0 0 auto; cursor: pointer; border: none; background: transparent; color: var(--text-mute3); font-size: 16px; line-height: 1; padding: 2px 4px; }
  .notif-item-mark-btn:hover { color: var(--blue); }
  .notif-empty { padding: 24px 14px; text-align: center; color: var(--text-mute3); font-size: 13.5px; }
  .row-highlight { animation: rowHighlightFade 2.5s ease; }
  @keyframes rowHighlightFade { 0% { background: #FFF3CD; } 100% { background: transparent; } }

  /* يحافظ على تخطيط عمودين تمامًا كما كان على الشاشات الكبيرة، ويتحول لعمود واحد على الجوال فقط */
  .field-grid-2col { grid-template-columns: 1fr; }
  @media (min-width: 600px) {
    .field-grid-2col { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="admin-wrap">
  <div class="admin-header">
    <h1 id="pageTitle" style="margin:0;font-size:22px;"></h1>
    <div class="header-actions">
      <div class="notif-wrap">
        <button class="notif-bell" id="notifBellBtn" type="button" aria-label="Notifications">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <span class="notif-badge hidden" id="notifBadge">0</span>
        </button>
        <div class="notif-dropdown hidden" id="notifDropdown">
          <div class="notif-dropdown-head">
            <strong id="notifTitleLabel"></strong>
            <button class="small-btn" id="notifMarkAllBtn" type="button"></button>
          </div>
          <div id="notifList"></div>
        </div>
      </div>
      <button class="small-btn" id="logoutBtn" type="button">تسجيل الخروج</button>
    </div>
  </div>

  <div class="admin-tabs">
    <button class="tab-btn active" data-tab="responses" id="tabBtnResponses"></button>
    <button class="tab-btn" data-tab="messages" id="tabBtnMessages"></button>
    <button class="tab-btn" data-tab="registrations" id="tabBtnRegistrations"></button>
    <button class="tab-btn" data-tab="content" id="tabBtnContent"></button>
    <button class="tab-btn" data-tab="email-templates" id="tabBtnEmailTemplates"></button>
  </div>

  <!-- ===== تبويب: نتائج اكتشف شغفك ===== -->
  <section id="tab-responses" class="admin-tab">
    <div class="toolbar">
      <input type="text" id="respSearch" />
      <label id="respSortLabel"></label>
      <select id="respSort">
        <option value="newest"></option>
        <option value="oldest"></option>
        <option value="name"></option>
        <option value="domain"></option>
      </select>
      <a class="btn btn-primary" id="respExportBtn" href="/api/admin/export.csv"></a>
    </div>
    <div class="table-scroll"><table>
      <thead><tr id="respHeadRow"></tr></thead>
      <tbody id="respBodyRows"></tbody>
    </table></div>
    <p class="status-text" id="respStatusText"></p>
    <div id="respDetail" class="detail-panel hidden"></div>
  </section>

  <!-- ===== تبويب: رسائل تواصل معنا ===== -->
  <section id="tab-messages" class="admin-tab hidden">
    <div class="toolbar">
      <input type="text" id="msgSearch" />
      <label id="msgSortLabel"></label>
      <select id="msgSort">
        <option value="newest"></option>
        <option value="oldest"></option>
        <option value="name"></option>
      </select>
      <a class="btn btn-primary" id="msgExportBtn" href="/api/admin/messages/export.csv"></a>
    </div>
    <div class="table-scroll"><table>
      <thead><tr id="msgHeadRow"></tr></thead>
      <tbody id="msgBodyRows"></tbody>
    </table></div>
    <p class="status-text" id="msgStatusText"></p>
  </section>

  <!-- ===== تبويب: تسجيلات الفعاليات ===== -->
  <section id="tab-registrations" class="admin-tab hidden">
    <div class="toolbar">
      <select id="regFilterEvent"></select>
      <select id="regFilterStatus">
        <option value=""></option>
        <option value="pending"></option>
        <option value="accepted"></option>
        <option value="rejected"></option>
      </select>
      <input type="text" id="regSearch" />
      <input type="date" id="regDateFrom" />
      <input type="date" id="regDateTo" />
      <a class="btn btn-primary" id="regExportBtn" href="/api/admin/event-registrations/export.csv"></a>
    </div>
    <div class="table-scroll"><table>
      <thead><tr id="regHeadRow"></tr></thead>
      <tbody id="regBodyRows"></tbody>
    </table></div>
    <p class="status-text" id="regStatusText"></p>
  </section>

  <!-- ===== تبويب: إدارة المحتوى ===== -->
  <section id="tab-content" class="admin-tab hidden">

    <div class="content-block">
      <h2 id="contentAboutTitle"></h2>
      <div class="field">
        <label id="aboutTextArLabel"></label>
        <textarea id="aboutTextAr"></textarea>
      </div>
      <div class="field">
        <label id="aboutTextEnLabel"></label>
        <textarea id="aboutTextEn"></textarea>
      </div>
      <div class="field">
        <label id="aboutImageLabel"></label>
        <input type="file" id="aboutImageFile" accept="image/*" />
        <div id="aboutImagePreviewWrap" style="margin-top:10px;"></div>
      </div>
      <button class="btn btn-primary" id="saveAboutBtn" type="button"></button>
      <span class="saved-note hidden" id="aboutSavedNote"></span>
    </div>

    <div class="content-block">
      <h2 id="contentContactTitle"></h2>
      <div class="field">
        <label id="contactEmailLabel"></label>
        <input type="email" id="contactEmailInput" dir="ltr" />
      </div>
      <div class="field">
        <label id="contactPhoneLabel"></label>
        <input type="tel" id="contactPhoneInput" dir="ltr" />
      </div>
      <button class="btn btn-primary" id="saveContactBtn" type="button"></button>
      <span class="saved-note hidden" id="contactSavedNote"></span>
    </div>

    <div class="content-block">
      <h2 id="contentSocialTitle"></h2>
      <div id="socialFieldsWrap"></div>
      <button class="btn btn-primary" id="saveSocialBtn" type="button"></button>
      <span class="saved-note hidden" id="socialSavedNote"></span>
    </div>

    <div class="content-block">
      <h2 id="contentActivitiesTitle"></h2>
      <div id="activitiesAdminList"></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:20px 0;" />
      <h3 id="activityFormTitle" style="font-size:15px;margin:0 0 14px;"></h3>
      <form id="activityForm">
        <input type="hidden" id="activityId" value="" />
        <div class="field-grid field-grid-2col">
          <div class="field"><label id="lblActivityTitleAr"></label><input type="text" id="activityTitleAr" required /></div>
          <div class="field"><label id="lblActivityTitleEn"></label><input type="text" id="activityTitleEn" required /></div>
          <div class="field"><label id="lblActivityTagAr"></label><input type="text" id="activityTagAr" /></div>
          <div class="field"><label id="lblActivityTagEn"></label><input type="text" id="activityTagEn" /></div>
          <div class="field"><label id="lblActivityDateAr"></label><input type="text" id="activityDateAr" /></div>
          <div class="field"><label id="lblActivityDateEn"></label><input type="text" id="activityDateEn" /></div>
        </div>
        <div class="field"><label id="lblActivityDescAr"></label><textarea id="activityDescAr"></textarea></div>
        <div class="field"><label id="lblActivityDescEn"></label><textarea id="activityDescEn"></textarea></div>
        <div class="field">
          <label id="lblActivityImage"></label>
          <input type="file" id="activityImageFile" accept="image/*" />
          <div id="activityImagePreviewWrap" style="margin-top:10px;"></div>
        </div>
        <div class="field">
          <label id="lblActivityStatus"></label>
          <select id="activityStatus">
            <option value="available" id="optAvailable"></option>
            <option value="upcoming" id="optUpcoming"></option>
            <option value="ended" id="optEnded"></option>
          </select>
        </div>
        <button class="btn btn-primary" id="saveActivityBtn" type="submit"></button>
        <button class="btn btn-secondary hidden" id="cancelActivityBtn" type="button"></button>
      </form>
    </div>

  </section>

  <!-- ===== تبويب: قوالب البريد ===== -->
  <section id="tab-email-templates" class="admin-tab hidden">
    <div class="content-block">
      <h2 id="emailTemplateAcceptanceTitle"></h2>
      <p class="status-text" id="emailTemplateVariablesHint" style="margin-top:-6px;"></p>
      <div class="field">
        <label id="emailTemplateSubjectLabel"></label>
        <input type="text" id="tplAcceptanceSubject" dir="rtl" />
      </div>
      <div class="field">
        <label id="emailTemplateBodyLabel"></label>
        <textarea id="tplAcceptanceBody" style="min-height:160px;"></textarea>
      </div>
      <button class="btn btn-primary" id="saveTplAcceptanceBtn" type="button"></button>
      <button class="small-btn" id="resetTplAcceptanceBtn" type="button" style="margin-inline-start:8px;"></button>
      <span class="saved-note hidden" id="tplAcceptanceSavedNote"></span>
    </div>

    <div class="content-block">
      <h2 id="emailSignatureTitle"></h2>
      <p class="status-text" id="emailSignatureHint" style="margin-top:-6px;"></p>
      <div class="field">
        <textarea id="emailSignatureInput" style="min-height:80px;"></textarea>
      </div>
      <button class="btn btn-primary" id="saveSignatureBtn" type="button"></button>
      <span class="saved-note hidden" id="signatureSavedNote"></span>
    </div>
  </section>
</div>

<script src="translations.js"></script>
<script>
(function () {
  const lang = "ar";
  const s = I18N[lang].admin;
  const $ = (id) => document.getElementById(id);

  async function adminFetch(url, options) {
    const res = await fetch(url, options);
    if (res.status === 401) {
      location.href = "/login.html";
      throw new Error("session expired");
    }
    return res;
  }

  $("logoutBtn").addEventListener("click", async () => {
    await fetch("/api/admin/logout", { method: "POST" });
    location.href = "/login.html";
  });

  let responses = [];
  let messages = [];
  let siteContentCache = { content: {}, activities: [] };
  let editingActivityId = null;
  let pendingAboutImageUrl = null;
  let pendingActivityImageUrl = null;

  // ===== نصوص ثابتة =====
  document.title = s.pageTitle;
  $("pageTitle").textContent = s.pageTitle;
  $("tabBtnResponses").textContent = s.tabResponses;
  $("tabBtnMessages").textContent = s.tabMessages;
  $("tabBtnRegistrations").textContent = s.tabRegistrations;
  $("tabBtnContent").textContent = s.tabContent;
  $("respSearch").placeholder = s.searchPlaceholder;
  $("respSortLabel").textContent = s.sortLabel;
  $("respSort").children[0].textContent = s.sortNewest;
  $("respSort").children[1].textContent = s.sortOldest;
  $("respSort").children[2].textContent = s.sortNameAsc;
  $("respSort").children[3].textContent = s.sortDomain;
  $("respExportBtn").textContent = s.exportButton;
  $("msgSearch").placeholder = s.searchPlaceholder;
  $("msgSortLabel").textContent = s.sortLabel;
  $("msgSort").children[0].textContent = s.sortNewest;
  $("msgSort").children[1].textContent = s.sortOldest;
  $("msgSort").children[2].textContent = s.sortNameAsc;
  $("msgExportBtn").textContent = s.exportButton;
  $("regSearch").placeholder = s.searchPlaceholder;
  $("regExportBtn").textContent = s.exportButton;
  $("regFilterStatus").children[0].textContent = s.regFilterStatus;
  $("regFilterStatus").children[1].textContent = s.regStatusPending;
  $("regFilterStatus").children[2].textContent = s.regStatusAccepted;
  $("regFilterStatus").children[3].textContent = s.regStatusRejected;
  const REG_STATUS_LABELS = { pending: s.regStatusPending, accepted: s.regStatusAccepted, rejected: s.regStatusRejected };
  $("tabBtnEmailTemplates").textContent = s.tabEmailTemplates;
  $("emailTemplateAcceptanceTitle").textContent = s.emailTemplateAcceptanceTitle;
  $("emailTemplateVariablesHint").textContent = s.emailTemplateVariablesHint;
  $("emailTemplateSubjectLabel").textContent = s.emailTemplateSubjectLabel;
  $("emailTemplateBodyLabel").textContent = s.emailTemplateBodyLabel;
  $("saveTplAcceptanceBtn").textContent = s.saveButton;
  $("resetTplAcceptanceBtn").textContent = s.resetToDefaultBtn;
  $("emailSignatureTitle").textContent = s.emailSignatureTitle;
  $("emailSignatureHint").textContent = s.emailSignatureHint;
  $("saveSignatureBtn").textContent = s.saveButton;
  $("notifTitleLabel").textContent = s.notifTitle;
  $("notifMarkAllBtn").textContent = s.notifMarkAllRead;
  const NOTIF_TYPE_LABELS = { quiz: s.notifTypeQuiz, contact: s.notifTypeContact, event_registration: s.notifTypeEventRegistration };
  $("contentAboutTitle").textContent = s.contentAboutTitle;
  $("aboutTextArLabel").textContent = s.aboutTextArLabel;
  $("aboutTextEnLabel").textContent = s.aboutTextEnLabel;
  $("aboutImageLabel").textContent = s.aboutImageLabel;
  $("saveAboutBtn").textContent = s.saveButton;
  $("contentContactTitle").textContent = s.contentContactTitle;
  $("contactEmailLabel").textContent = s.contactEmailLabel;
  $("contactPhoneLabel").textContent = s.contactPhoneLabel;
  $("saveContactBtn").textContent = s.saveButton;
  $("contentSocialTitle").textContent = s.contentSocialTitle;
  $("saveSocialBtn").textContent = s.saveButton;
  $("contentActivitiesTitle").textContent = s.contentActivitiesTitle;
  $("activityFormTitle").textContent = s.addActivity;
  $("lblActivityTitleAr").textContent = s.activityTitleAr;
  $("lblActivityTitleEn").textContent = s.activityTitleEn;
  $("lblActivityTagAr").textContent = s.activityTagAr;
  $("lblActivityTagEn").textContent = s.activityTagEn;
  $("lblActivityDateAr").textContent = s.activityDateAr;
  $("lblActivityDateEn").textContent = s.activityDateEn;
  $("lblActivityDescAr").textContent = s.activityDescAr;
  $("lblActivityDescEn").textContent = s.activityDescEn;
  $("lblActivityImage").textContent = s.activityImage;
  $("lblActivityStatus").textContent = s.activityStatus;
  $("optAvailable").textContent = s.statusAvailable;
  $("optUpcoming").textContent = s.statusUpcoming;
  $("optEnded").textContent = s.statusEnded;
  const STATUS_LABELS = { available: s.statusAvailable, upcoming: s.statusUpcoming, ended: s.statusEnded };
  $("saveActivityBtn").textContent = s.saveActivity;
  $("cancelActivityBtn").textContent = s.cancelEdit;

  const SOCIAL_KEYS = ["whatsapp_channel_url", "social_instagram", "social_x", "social_snapchat", "social_tiktok", "social_youtube", "social_telegram"];
  $("socialFieldsWrap").innerHTML = SOCIAL_KEYS.map((key) => `
    <div class="field">
      <label>${s.socialLabels[key]}</label>
      <input type="url" dir="ltr" id="social_${key}" placeholder="https://" />
    </div>`).join("");

  // ===== تبويبات =====
  function switchToTab(tabName) {
    document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
    document.querySelectorAll(".admin-tab").forEach((sec) => sec.classList.add("hidden"));
    const btn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
    if (btn) btn.classList.add("active");
    $(`tab-${tabName}`).classList.remove("hidden");
  }

  document.querySelectorAll(".tab-btn").forEach((btn) => {
    btn.addEventListener("click", () => switchToTab(btn.dataset.tab));
  });

  function highlightRow(bodyId, rowId) {
    const row = document.querySelector(`#${bodyId} tr[data-id="${rowId}"]`);
    if (!row) return;
    row.scrollIntoView({ behavior: "smooth", block: "center" });
    row.classList.remove("row-highlight");
    void row.offsetWidth; // إعادة تشغيل الأنيميشن إن تكرر النقر على نفس الإشعار
    row.classList.add("row-highlight");
  }

  // ===== نتائج اكتشف شغفك =====
  const respCols = ["id", "full_name", "age", "gender", "city", "email", "phone", "status", "top1", "top2", "top3", "ui_language", "created_at"];
  const respHeadRow = $("respHeadRow");
  respCols.forEach((c) => {
    const th = document.createElement("th");
    th.textContent = s.columns[c];
    respHeadRow.appendChild(th);
  });

  // خرائط عرض الجنس/الحالة الكاملة — للعرض فقط، القيم المخزَّنة (male/female، student/...) لا تتغيّر
  const GENDER_LABELS = Object.fromEntries(I18N[lang].genderOptions.map((o) => [o.value, o.label]));
  const STATUS_VALUE_LABELS = Object.fromEntries(I18N[lang].statusOptions.map((o) => [o.value, o.label]));

  // ينسّق التاريخ الخام (ISO) لصيغة مقروءة حسب لغة لوحة التحكم الحالية — للعرض فقط
  function formatDateTime(iso) {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return iso;
    const day = String(d.getDate()).padStart(2, "0");
    const month = String(d.getMonth() + 1).padStart(2, "0");
    if (lang === "en") {
      const time = d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", hour12: true });
      return `${day}-${month}-${d.getFullYear()} ${time}`;
    }
    const time = d.toLocaleTimeString("ar-EG-u-nu-latn", { hour: "2-digit", minute: "2-digit", hour12: true });
    return `${day}-${month}-${d.getFullYear()} ${time}`;
  }

  function filterSortResponses() {
    const q = $("respSearch").value.trim().toLowerCase();
    let rows = responses.filter((r) =>
      !q || (r.full_name || "").toLowerCase().includes(q) || (r.city || "").toLowerCase().includes(q)
    );
    const sortBy = $("respSort").value;
    if (sortBy === "oldest") rows = rows.slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    else if (sortBy === "name") rows = rows.slice().sort((a, b) => (a.full_name || "").localeCompare(b.full_name || "", "ar"));
    else if (sortBy === "domain") rows = rows.slice().sort((a, b) => (a.top1 || "").localeCompare(b.top1 || ""));
    else rows = rows.slice().sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    return rows;
  }

    $("respStatusText").textContent = "";
    const domainNames = I18N[lang].domainNames;

    rows.forEach((row) => {

        else if (c === "status") td.textContent = STATUS_VALUE_LABELS[value] || value || "";

    const res = await adminFetch(`/api/admin/responses/${id}`);

    const data = await res.json();
    const panel = $("respDetail");

  function formatNotifTime(iso) {
    try {
      return new Date(iso).toLocaleString("ar");
    } catch (err) {
      return iso;
    }
  }

  function renderNotifDropdown() {
    const list = $("notifList");
    if (!notifications.length) {
      list.innerHTML = `<div class="notif-empty">${s.notifEmpty}</div>`;
      return;
    }
    list.innerHTML = notifications.map((n) => `
      <div class="notif-item${n.is_read ? "" : " unread"}" data-id="${n.id}">
        <span class="notif-item-dot"></span>
        <div class="notif-item-body" data-action="goto" data-id="${n.id}">
          <div class="notif-item-type">${NOTIF_TYPE_LABELS[n.type] || n.type}</div>
          <div class="notif-item-name">${n.visitor_name}</div>
          <div class="notif-item-time">${formatNotifTime(n.created_at)}</div>
        </div>
        ${n.is_read ? "" : `<button class="notif-item-mark-btn" type="button" data-action="mark" data-id="${n.id}" title="${s.notifMarkAllRead}">✓</button>`}
      </div>`).join("");

    list.querySelectorAll('[data-action="goto"]').forEach((el) => {
      el.addEventListener("click", () => goToNotification(Number(el.dataset.id)));
    });
    list.querySelectorAll('[data-action="mark"]').forEach((el) => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        markNotificationRead(Number(el.dataset.id));
      });
    });

  function updateNotifBadge() {
    const unreadCount = notifications.filter((n) => !n.is_read).length;
    const badge = $("notifBadge");
    if (unreadCount > 0) {
      badge.textContent = unreadCount > 99 ? "99+" : String(unreadCount);
      badge.classList.remove("hidden");
    } else {
      badge.classList.add("hidden");
    }
  }

  async function loadNotifications() {
    const res = await adminFetch("/api/admin/notifications");
    if (!res.ok) return;
    const data = await res.json();
    notifications = data.notifications;
    updateNotifBadge();
    renderNotifDropdown();
  }

  async function markNotificationRead(id) {
    const n = notifications.find((x) => x.id === id);
    if (n) n.is_read = 1;
    updateNotifBadge();
    renderNotifDropdown();
    await adminFetch(`/api/admin/notifications/${id}/read`, { method: "PATCH" });
  }

  async function markAllNotificationsRead() {
    notifications.forEach((n) => { n.is_read = 1; });
    updateNotifBadge();
    renderNotifDropdown();
    await adminFetch("/api/admin/notifications/read-all", { method: "PATCH" });
  }

  async function goToNotification(id) {
    const n = notifications.find((x) => x.id === id);
    if (!n) return;
    if (!n.is_read) await markNotificationRead(id);
    $("notifDropdown").classList.add("hidden");

    if (n.type === "quiz") {
      switchToTab("responses");
      showResponseDetail(n.reference_id);
    } else if (n.type === "contact") {
      switchToTab("messages");
      $("msgSearch").value = "";
      $("msgSort").value = "newest";
      renderMessagesTable();
      setTimeout(() => highlightRow("msgBodyRows", n.reference_id), 150);
    } else if (n.type === "event_registration") {
      switchToTab("registrations");
      $("regFilterEvent").value = "";
      $("regSearch").value = "";
      $("regDateFrom").value = "";
      $("regDateTo").value = "";
      await loadRegistrations();
      setTimeout(() => highlightRow("regBodyRows", n.reference_id), 150);
    }
  }

    }
  }

  $("saveTplAcceptanceBtn").addEventListener("click", async () => {
    await adminFetch("/api/admin/email-templates/event_acceptance", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ subject: $("tplAcceptanceSubject").value, body: $("tplAcceptanceBody").value }),
    });
    $("tplAcceptanceSavedNote").textContent = s.savedMessage;
    $("tplAcceptanceSavedNote").classList.remove("hidden");
    setTimeout(() => $("tplAcceptanceSavedNote").classList.add("hidden"), 2500);
  });

  $("resetTplAcceptanceBtn").addEventListener("click", async () => {
    if (!confirm(s.resetConfirm)) return;
    const res = await adminFetch("/api/admin/email-templates/event_acceptance/reset", { method: "POST" });
    if (res.ok) {
      const data = await res.json();
      $("tplAcceptanceSubject").value = data.template.subject;
      $("tplAcceptanceBody").value = data.template.body;
    }
  });

  $("saveSignatureBtn").addEventListener("click", async () => {
    const value = $("emailSignatureInput").value;
    await adminFetch("/api/admin/content", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email_signature: value }),
    });
    siteContentCache.content.email_signature = value;
    $("signatureSavedNote").textContent = s.savedMessage;
    $("signatureSavedNote").classList.remove("hidden");
    setTimeout(() => $("signatureSavedNote").classList.add("hidden"), 2500);
  });

  Promise.all([loadResponses(), loadMessages(), loadSiteContentAdmin(), loadRegistrations(), loadNotifications(), loadEmailTemplates()])
    .then(handleNotifDeepLink)
    .catch(() => {
      $("respStatusText").textContent = "تعذّر تحميل البيانات — تحقق من تسجيل الدخول";
    });
})();
</script>
</body>
</html>
